version: '3.9'

services:
  php:
    container_name: globalSeguro-php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: always
    tty: true
    volumes:
      - ./:/var/www
    networks:
      - globalSeguro-network
    ports:
      - '8080:9000'  # PHP-FPM

  nginx:
    container_name: globalSeguro-nginx
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: always
    tty: true
    ports:
      - '1025:80'
      - '450:443'
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - globalSeguro-network
    depends_on:
      - php

  mysql:
    container_name: globalSeguro-mysql
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    tty: true
    volumes:
      - globalSeguro-data:/var/lib/mysql/
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - globalSeguro-network
    ports:
      - '3308:3306'
    environment:
      MYSQL_DATABASE: nf
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: nf@204

  phpmyadmin:
    container_name: globalSeguro-phpmyadmin
    image: phpmyadmin:5.2
    restart: always
    ports:
      - '8892:80'
    networks:
      - globalSeguro-network
    environment:
      PMA_HOST: globalSeguro-mysql
    depends_on:
      - mysql

  redis:
    container_name: globalSeguro-redis
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    restart: always
    ports:
      - '6388:6379'
    networks:
      - globalSeguro-network
    volumes:
      - redis-data:/data

  python-ml:
    container_name: globalSeguro-python-ml
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    restart: always
    tty: true
    working_dir: /app
    volumes:
      - ./ml-service:/app
    ports:
      - '5000:5000'
    networks:
      - globalSeguro-network

# **Definição da rede e volumes**
networks:
  globalSeguro-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24

volumes:
  globalSeguro-data:
    driver: local
  redis-data:
    driver: local
